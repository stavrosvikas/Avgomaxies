<script>
// ════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════
const W=960,H=540,GROUND=415,ER=46;
const GRAVITY=0.58,FRICTION=0.80,MOVE_ACC=0.95,MAX_SPD=8.5;
const JUMP_F=-14.5,MAX_CHARGE_MS=2000,MAX_CF=28,MIN_CF=7;
const DMG_MULT=0.85,MAX_HP=100,ROUNDS_WIN=2;

// AI difficulty: starts very easy, ramps slowly
function aiDiff(s){
  if(s<=2)  return 0.2+s*0.1;           // stages 1-2: very passive
  if(s<=6)  return 0.4+(s-2)*0.2;       // stages 3-6: gentle ramp
  if(s<=12) return 1.2+(s-6)*0.45;      // stages 7-12: medium
  if(s<=20) return 3.9+(s-12)*0.55;     // stages 13-20: hard
  return Math.min(12,8.3+(s-20)*0.3);
}

// ════════════════════════════════════════════════
//  CHARACTERS
// ════════════════════════════════════════════════
const CHARS=[
  {id:'character01',name:'ΕΥΑΓΓΕΛΑΤΟΣ',col:'#F5E230',shade:'#B09800'},
  {id:'character02',name:'EGG7000',    col:'#3CB371',shade:'#1A5C35'},
  {id:'character03',name:'MAREEGONA', col:'#F2E8D0',shade:'#C8A880'},
  {id:'character04',name:'ΑΥΓΥΛΑΣ',   col:'#1E1E1E',shade:'#0A0A0A'},
  {id:'character05',name:'ΜΗΤΣΟΦΛΑΚΗΣ',col:'#2E8FD8',shade:'#1050A0'},
  {id:'character06',name:'ΑΥΓΟΥΜΠΑΣ',col:'#E03030',shade:'#8A1010'},
];

// ════════════════════════════════════════════════
//  AUDIO (Web Audio API + file fallback)
// ════════════════════════════════════════════════
const SFX=(()=>{
  let AC=null,sfxG=null,musG=null,muted=false;
  let bgmSrc=null,bgmName=null;
  const loaded={};
  const _timers=[]; // track pending SFX setTimeout IDs

  function _clearTimers(){ _timers.forEach(clearTimeout); _timers.length=0; }
  function _t(fn,ms){ const id=setTimeout(fn,ms); _timers.push(id); return id; }

  function init(){
    try{
      AC=new(window.AudioContext||window.webkitAudioContext)();
      musG=AC.createGain();musG.gain.value=0.35;musG.connect(AC.destination);
      sfxG=AC.createGain();sfxG.gain.value=0.65;sfxG.connect(AC.destination);
    }catch(e){}
  }
  function resume(){
    if(AC&&AC.state==='suspended')AC.resume();
    preloadVoices(); // start preloading on first user gesture
  }

  function tone(f1,f2,dur,type,vol=0.45,dst=null){
    if(!AC||muted)return;
    const osc=AC.createOscillator(),g=AC.createGain();
    osc.type=type||'sine';
    osc.frequency.setValueAtTime(f1,AC.currentTime);
    if(f2!==f1)osc.frequency.exponentialRampToValueAtTime(Math.max(f2,1),AC.currentTime+dur);
    g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+dur);
    osc.connect(g);g.connect(dst||sfxG);osc.start();osc.stop(AC.currentTime+dur+0.06);
  }
  function noise(dur,vol=0.4){
    if(!AC||muted)return;
    const n=Math.ceil(AC.sampleRate*dur),buf=AC.createBuffer(1,n,AC.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
    const s=AC.createBufferSource(),g=AC.createGain();
    s.buffer=buf;g.gain.value=vol;s.connect(g);g.connect(sfxG);s.start();
  }
  // ── Character voice map: id → filename ──────────────────────────────
  // Files must be in assets/sounds/ with these exact names
  const CHAR_SND={
    'character01':'evaggelatos',  // ΕΥΑΓΓΕΛΑΤΟΣ
    'character02':'dpg',          // EGG7000
    'character03':'marigkona',    // MAREEGONA
    'character04':'akylas',       // ΑΥΓΥΛΑΣ
    'character05':'mitsotakis',   // ΜΗΤΣΟΦΛΑΚΗΣ
    'character06':'koutsoumpas',  // ΑΥΓΟΥΜΠΑΣ
  };

  // Exclusive voice channel — only one character voice plays at a time
  let _voiceSrc=null;
  let _voiceBusy=false;
  let _voiceBusyTimer=null;

  function playVoice(url, onEnd){
    if(!AC||muted)return;
    // Stop currently playing voice
    if(_voiceSrc){try{_voiceSrc.stop();}catch(e){}_voiceSrc=null;}
    clearTimeout(_voiceBusyTimer);
    _voiceBusy=true;

    function _startVoice(buf){
      if(!buf)return;
      _voiceSrc=AC.createBufferSource();
      _voiceSrc.buffer=buf;
      const g=AC.createGain(); g.gain.value=0.9;
      _voiceSrc.connect(g); g.connect(sfxG);
      _voiceSrc.start();
      // Mark busy for duration of sample
      const durMs=Math.round(buf.duration*1000)+80;
      _voiceBusyTimer=setTimeout(()=>{_voiceBusy=false;if(onEnd)onEnd();},durMs);
      _voiceSrc.onended=()=>{_voiceSrc=null;};
    }

    if(loaded[url]){_startVoice(loaded[url]);return;}
    fetch(url).then(r=>r.ok?r.arrayBuffer():null)
      .then(b=>b&&AC.decodeAudioData(b))
      .then(dec=>{if(dec){loaded[url]=dec;_startVoice(dec);}})
      .catch(()=>{});
  }

  function stopVoice(){
    if(_voiceSrc){try{_voiceSrc.stop();}catch(e){}_voiceSrc=null;}
    clearTimeout(_voiceBusyTimer);_voiceBusy=false;
  }

  // Preload all character voices + intro at game start
  function preloadVoices(){
    if(!AC)return;
    const urls=[
      'assets/sounds/intro.wav',
      ...Object.values(CHAR_SND).map(n=>`assets/sounds/${n}_hit.wav`),
    ];
    urls.forEach(url=>{
      if(loaded[url])return;
      fetch(url).then(r=>r.ok?r.arrayBuffer():null)
        .then(b=>b&&AC.decodeAudioData(b))
        .then(dec=>{if(dec)loaded[url]=dec;})
        .catch(()=>{});
    });
  }

  function tryFile(url){
    if(!AC||muted)return;
    if(loaded[url]){const s=AC.createBufferSource();s.buffer=loaded[url];s.connect(sfxG);s.start();return;}
    fetch(url).then(r=>r.ok?r.arrayBuffer():null).then(b=>b&&AC.decodeAudioData(b))
      .then(dec=>{if(dec){loaded[url]=dec;const s=AC.createBufferSource();s.buffer=dec;s.connect(sfxG);s.start();}})
      .catch(()=>{});
  }

  // Cut all SFX immediately
  function stopAllSFX(){
    _clearTimers();stopVoice();
    if(!AC||!sfxG)return;
    const now=AC.currentTime;
    sfxG.gain.cancelScheduledValues(now);
    sfxG.gain.setValueAtTime(0,now);
    sfxG.gain.linearRampToValueAtTime(muted?0:0.65,now+0.08);
  }

  const playJump=()=>tone(200,420,0.14,'sine',0.4);
  const playCharge=t=>{tone(60+t*100,70+t*110,0.22,'sawtooth',0.12+t*0.18);};
  const playRelease=t=>{tone(180+t*200,80,0.25,'sawtooth',0.5);_t(()=>noise(0.12,0.38),28);};

  const playHit=(ci,pow)=>{
    const bf=[220,175,290,145,255,210];
    const f=bf[ci%6]*(1+pow*0.014);
    tone(f*1.4,f,0.12,'triangle',0.35+pow*0.035);
    _t(()=>noise(0.07,0.28+pow*0.025),38);
    // Unique character voice — exclusive, won't overlap
    const snd=CHAR_SND[CHARS[ci]?.id];
    if(snd)playVoice(`assets/sounds/${snd}_hit.wav`);
  };

  const playDead=ci=>{
    tone(300,70,0.6,'sawtooth',0.55);
    _t(()=>noise(0.3,0.48),80);
    // No _dead.wav files — procedural only
  };

  // Intro voice: plays during countdown, stops when fight starts
  const playIntro=()=>{
    playVoice('assets/sounds/intro.wav');
  };

  const playWin=()=>{
    _clearTimers();stopVoice();
    [523,659,784,1047].forEach((f,i)=>_t(()=>tone(f,f,0.28,'sine',0.4),i*180));
  };
  const playLose=()=>{
    _clearTimers();stopVoice();
    [400,350,280,200].forEach((f,i)=>_t(()=>tone(f,f,0.3,'triangle',0.3),i*200));
  };
  const playCountdown=()=>tone(880,880,0.1,'square',0.35);
  const playRoundStart=()=>{
    stopVoice(); // cut intro if still playing
    tone(440,660,0.2,'sine',0.5);
    _t(()=>tone(660,880,0.15,'sine',0.5),200);
  };

  function playBGM(name){
    if(!AC)return;stopBGM();
    fetch(`assets/sounds/music_${name}.mp3`).then(r=>r.ok?r.arrayBuffer():null)
      .then(b=>b&&AC.decodeAudioData(b)).then(dec=>{
        if(!dec)return;bgmSrc=AC.createBufferSource();bgmSrc.buffer=dec;bgmSrc.loop=true;
        bgmSrc.connect(musG);bgmSrc.start();bgmName=name;
      }).catch(()=>{});
  }
  function stopBGM(){
    _clearTimers();
    if(bgmSrc){try{bgmSrc.stop();}catch(e){}bgmSrc=null;bgmName=null;}
    // Also cut SFX gain briefly
    if(AC&&sfxG){
      const now=AC.currentTime;
      sfxG.gain.cancelScheduledValues(now);
      sfxG.gain.setValueAtTime(0,now);
      sfxG.gain.linearRampToValueAtTime(muted?0:0.65,now+0.12);
    }
  }
  function switchBGM(n){if(bgmName!==n)playBGM(n);}
  function toggleMute(){muted=!muted;if(musG)musG.gain.value=muted?0:0.35;if(sfxG)sfxG.gain.value=muted?0:0.65;return muted;}
  const isMuted=()=>muted;

  return{init,resume,playJump,playCharge,playRelease,playHit,playDead,playWin,playLose,playCountdown,playRoundStart,playIntro,switchBGM,stopBGM,stopAllSFX,toggleMute,isMuted};
})();

// ════════════════════════════════════════════════
//  SCOREBOARD SECURITY — simple hash to detect tampering
// ════════════════════════════════════════════════
const _SALT='EggBattle_v1_xK9mP4rQ';
function _hashScores(arr){
  const s=JSON.stringify(arr)+_SALT;
  let h=5381;
  for(let i=0;i<s.length;i++){h=((h<<5)+h+s.charCodeAt(i))&0xFFFFFFFF;}
  return(h>>>0).toString(36);
}
function _saveScores(){
  localStorage.setItem('egb_scores',JSON.stringify(scores));
  localStorage.setItem('egb_scores_h',_hashScores(scores));
}
function _loadScores(){
  try{
    const raw=localStorage.getItem('egb_scores');
    const hash=localStorage.getItem('egb_scores_h');
    if(!raw)return[];
    const parsed=JSON.parse(raw);
    if(!Array.isArray(parsed))return[];
    // Verify integrity
    if(hash!==_hashScores(parsed)){
      console.warn('[EggBattle] Scoreboard integrity failed — resetting.');
      localStorage.removeItem('egb_scores');
      localStorage.removeItem('egb_scores_h');
      return[];
    }
    // Validate each entry shape
    return parsed.filter(e=>
      typeof e.name==='string'&&e.name.length>0&&e.name.length<=12&&
      typeof e.streak==='number'&&e.streak>=0&&e.streak<=9999&&
      Number.isInteger(e.streak)
    );
  }catch(e){return[];}
}

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
let scr='INTRO',mode=null,p1ci=0,p2ci=1,charCur=0;
let stage=1,streak=0;
let scores=_loadScores();
let hs=scores.length?Math.max(...scores.map(s=>s.streak)):0;
let rw=[0,0],roundMsg='',rndTimer=0,rndWinner='',rndEnd=false,matchDone=false;
let nickInput='',collectNick=false,blink=true,blinkT=0,chargeLastSfx=0,copiedFeedback=0;
let logoImg=null;
// Preload idle sprites for char select preview
const charSelImgs=CHARS.map(c=>{const img=new Image();img.src=`assets/characters/${c.id}/idle.png`;return img;});

// Screen shake
let shakeX=0,shakeY=0,shakePow=0;
function triggerShake(power){ shakePow=Math.max(shakePow,power); }

// Particle sparks
const particles=[];
function spawnSparks(x,y,power,col){
  const n=Math.min(6+Math.floor(power*1.5),16);
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const spd=2+Math.random()*power*0.6;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-2,life:1,col,r:3+Math.random()*3});
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*(dt/16); p.y+=p.vy*(dt/16);
    p.vy+=0.18*(dt/16);
    p.life-=dt/400;
    if(p.life<=0)particles.splice(i,1);
  }
}
function drawParticles(){
  particles.forEach(p=>{
    ctx.save();
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.col;
    ctx.shadowBlur=8;ctx.shadowColor=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
}

// Countdown
let cdCount=0,cdTimer=0,cdActive=false;
function startCountdown(){
  cdCount=3;cdTimer=900;cdActive=true;
  SFX.playIntro(); // play intro voice during countdown
}

// Perfect round tracking (no damage received)
let p1Perfect=true, p2Perfect=true;

// Hit combo
let p1Combo=0,p1ComboTimer=0;
let p2Combo=0,p2ComboTimer=0;

const _li=new Image();_li.onload=()=>logoImg=_li;_li.src='assets/logo.png';

// ════════════════════════════════════════════════
//  MULTIPLAYER
// ════════════════════════════════════════════════
let peer=null,conn=null,isHost=false,myPeerId=null,mpR1=false,mpR2=false;
let _mpMatchWinner=''; // 'P1'=host won, 'P2'=guest won, ''=none yet
let remInp={l:false,r:false,u:false,d:false};
// Jump edge-detection: separate prev-state per egg
let _prevP1u=false, _prevP2u=false;
// Connection states: idle | peer_init | waiting_guest | connecting | connected | error
let mpState='idle', mpErr='', _mpTimeout=null;

// ════════════════════════════════════════════════
//  INPUT
// ════════════════════════════════════════════════
const K={l:false,r:false,u:false,d:false},Kp={l:false,r:false,u:false,d:false};

// ── 4-button touch wiring ────────────────────────
function bindBtn(id,k){
  const el=document.getElementById(id);if(!el)return;
  const on=()=>{K[k]=true;el.classList.add('on');};
  const off=()=>{K[k]=false;el.classList.remove('on');};
  el.addEventListener('touchstart',e=>{on();e.preventDefault();},{passive:false});
  el.addEventListener('touchend',  e=>{off();e.preventDefault();},{passive:false});
  el.addEventListener('touchcancel',e=>{off();e.preventDefault();},{passive:false});
  el.addEventListener('mousedown',on);

}

document.addEventListener('keydown',e=>{
  if(e.repeat)return;
  const m={ArrowLeft:'l',ArrowRight:'r',ArrowUp:'u',ArrowDown:'d'};
  if(m[e.key])K[m[e.key]]=true;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key))e.preventDefault();
  onKey(e);
});
document.addEventListener('keyup',e=>{
  const m={ArrowLeft:'l',ArrowRight:'r',ArrowUp:'u',ArrowDown:'d'};
  if(m[e.key])K[m[e.key]]=false;
});

function onKey(e){
  const k=e.key;
  SFX.resume();
  if(scr==='INTRO'&&(k===' '||k==='Enter')){toMode();return;}
  if(scr==='MODE'){if(k==='1')startSingle();if(k==='2')startMulti();return;}
  if(scr==='CHARSEL'){
    if(k==='ArrowLeft'&&charCur>0)charCur--;
    if(k==='ArrowRight'&&charCur<5)charCur++;
    if(k==='Enter')confirmChar();
    if(k==='Escape')scr='MODE';
    return;
  }
  if(scr==='MPLOBY'){
    let changed=false;
    if(k==='ArrowLeft'){if(isHost&&p1ci>0){p1ci--;changed=true;}else if(!isHost&&p2ci>0){p2ci--;changed=true;}}
    if(k==='ArrowRight'){if(isHost&&p1ci<5){p1ci++;changed=true;}else if(!isHost&&p2ci<5){p2ci++;changed=true;}}
    if(changed&&conn&&conn.open)conn.send({t:'char',i:isHost?p1ci:p2ci});
    if(k==='Enter')toggleReady();
    if(k==='Escape'){closePeer();scr='MODE';updateMobileUI();}
    return;
  }
  if(scr==='STGCLEAR'&&(k===' '||k==='Enter')){initFight();return;}
  if(scr==='MATCHOVER'&&(k===' '||k==='Enter')){if(mode==='multi'){scr='MPLOBY';if(mpState!=='connected'){mpState='error';mpErr='Η σύνδεση έκλεισε. Μοιράσου νέο link.';}}else{scr='CHARSEL';}rw=[0,0];return;}
  if(scr==='GAMEOVER'&&collectNick){
    if(k==='Enter'&&nickInput.length>0){saveNick();return;}
    if(k==='Backspace'){nickInput=nickInput.slice(0,-1);return;}
    if(k.length===1&&nickInput.length<12)nickInput+=k.toUpperCase();
    return;
  }
  if(k==='Escape'){if(scr==='CHARSEL')scr='MODE';if(scr==='FIGHT')scr='INTRO';}
  if(k==='m'||k==='M'){SFX.toggleMute();updateMuteBtn();}
}

let _fsRequested=false;
function requestFS(){
  if(_fsRequested)return;
  _fsRequested=true;
  const el=document.documentElement;
  const req=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen;
  if(req){
    req.call(el).catch(()=>{});
  }
  // Lock to landscape on supported browsers (Android Chrome)
  if(screen.orientation&&screen.orientation.lock){
    screen.orientation.lock('landscape').catch(()=>{});
  }
}

// ── Swipe detection for char select ──────────────
let _swipeX=null,_swipeY=null;
canvas.addEventListener('touchstart',e=>{
  SFX.resume();requestFS();
  if(scr==='INTRO'){toMode();return;}
  if(scr==='STGCLEAR'){initFight();return;}
  if(scr==='MATCHOVER'){_goAfterMatch();return;}
  // Record swipe start for CHARSEL / MPLOBY
  if(scr==='CHARSEL'||scr==='MPLOBY'){
    _swipeX=e.changedTouches[0].clientX;
    _swipeY=e.changedTouches[0].clientY;
    return; // don't process tap yet — wait for touchend
  }
  const t=e.changedTouches[0],rect=canvas.getBoundingClientRect();
  click2((t.clientX-rect.left)*W/rect.width,(t.clientY-rect.top)*H/rect.height);
},{passive:true});

canvas.addEventListener('touchend',e=>{
  if(scr==='CHARSEL'||scr==='MPLOBY'){
    const dx=e.changedTouches[0].clientX-(_swipeX||0);
    const dy=e.changedTouches[0].clientY-(_swipeY||0);
    const absDx=Math.abs(dx),absDy=Math.abs(dy);
    if(absDx>30&&absDx>absDy*1.5){
      // Horizontal swipe
      if(scr==='CHARSEL'){
        if(dx<0&&charCur<5)charCur++;
        else if(dx>0&&charCur>0)charCur--;
      }else if(scr==='MPLOBY'){
        const changed=dx<0?(isHost&&p1ci<5?(p1ci++,true):(!isHost&&p2ci<5?(p2ci++,true):false))
                         :(isHost&&p1ci>0?(p1ci--,true):(!isHost&&p2ci>0?(p2ci--,true):false));
        if(changed&&conn&&conn.open)conn.send({t:'char',i:isHost?p1ci:p2ci});
      }
    }else if(absDx<15&&absDy<15){
      // Short tap — process as click
      const t=e.changedTouches[0],rect=canvas.getBoundingClientRect();
      click2((t.clientX-rect.left)*W/rect.width,(t.clientY-rect.top)*H/rect.height);
    }
    _swipeX=null;_swipeY=null;
  }
},{passive:true});

function handlePtr(e){
  if(scr==='INTRO'){toMode();return;}
  if(scr==='STGCLEAR'){initFight();return;}
  if(scr==='MATCHOVER'){_goAfterMatch();return;}
  const rect=canvas.getBoundingClientRect();
  click2((e.clientX-rect.left)*W/rect.width,(e.clientY-rect.top)*H/rect.height);
}

function click2(x,y){
  if(scr==='MODE'){
    if(ib(x,y,W/2-190,H/2-85,380,72))startSingle();
    if(ib(x,y,W/2-190,H/2+15,380,72))startMulti();
    return;
  }
  if(scr==='CHARSEL'){
    const cw2=130,sx2=(W-6*cw2)/2;
    for(let i=0;i<6;i++){if(ib(x,y,sx2+i*cw2+3,74,cw2-6,148)){charCur=i;confirmChar();return;}}
    return;
  }
  if(scr==='MPLOBY'){
    if(mpState==='error'){
      if(ib(x,y,W/2-120,H/2+30,110,46)){mpRetry();return;}
      if(ib(x,y,W/2+10, H/2+30,110,46)){closePeer();scr='MODE';updateMobileUI();return;}
    }
    if(mpState==='connected'){
      // Character cards
      const cw2=130,sx2=(W-6*cw2)/2;
      for(let i=0;i<6;i++){
        if(ib(x,y,sx2+i*cw2+3,78,cw2-6,140)){
          if(isHost)p1ci=i; else p2ci=i;
          if(conn&&conn.open)conn.send({t:'char',i:isHost?p1ci:p2ci});
          return;
        }
      }
      // Ready button
      if(ib(x,y,W/2-115,H-62,230,44))toggleReady();
    }
    // Copy button (host only)
    if(isHost&&myPeerId&&ib(x,y,W-152,100,114,44)){
      const url=window.location.href.split('?')[0]+'?room='+myPeerId;
      mpShareOrCopy(url);
    }
  }
}
function ib(x,y,bx,by,bw,bh){return x>=bx&&x<=bx+bw&&y>=by&&y<=by+bh;}

class Egg{
  constructor(x,ci,facing){
    Object.assign(this,{x,y:GROUND,vx:0,vy:0,hp:MAX_HP,ci,facing,onGnd:true,
      charging:false,chargeT:0,chargeDX:0,rot:0,hitFlash:0,dead:false,crackLv:0,
      anim:'idle',frameIdx:0,frameT:0,_pd:false,sprites:{},dmgCooldown:0});
    this.spriteCfg={idle:{f:4,fps:150},roll:{f:6,fps:75},jump:{f:4,fps:110},
      charge:{f:4,fps:120},superjump:{f:4,fps:70},hit:{f:3,fps:80},dead:{f:4,fps:160}};
    const id=CHARS[ci].id;
    Object.keys(this.spriteCfg).forEach(a=>{
      const img=new Image();img.onload=()=>this.sprites[a]=img;
      img.src=`assets/characters/${id}/${a}.png`;
    });
  }
  get C(){return CHARS[this.ci];}

  update(l,r,u,d,dt,isP){
    if(this.dead)return;
    if(d&&!this._pd&&this.onGnd&&!this.charging){
      this.charging=true;this.chargeT=Date.now();
      this.chargeDX=l?-1:r?1:this.facing;
    }
    this._pd=d;
    if(this.charging&&isP){
      // Direction updates live while holding — player can aim until release
      if(l)this.chargeDX=-1;
      else if(r)this.chargeDX=1;
      const now=Date.now();
      if(now-chargeLastSfx>200){chargeLastSfx=now;SFX.playCharge(Math.min((now-this.chargeT)/MAX_CHARGE_MS,1));}
    }
    if(!d&&this.charging){
      const t=Math.min((Date.now()-this.chargeT)/MAX_CHARGE_MS,1);
      const f=MIN_CF+t*(MAX_CF-MIN_CF);
      this.vx=this.chargeDX*f;this.vy=-f*0.72;
      this.onGnd=false;this.charging=false;this._sa('superjump');
      if(isP)SFX.playRelease(t);
    }
    if(!this.charging){
      if(l){this.vx-=MOVE_ACC;this.facing=-1;}
      if(r){this.vx+=MOVE_ACC;this.facing=1;}
      if(u&&this.onGnd){this.vy=JUMP_F;this.onGnd=false;if(isP)SFX.playJump();}
      if(this.onGnd)this.vx*=FRICTION;
    }else{this.vx*=0.86;}
    this.vx=Math.max(-MAX_SPD,Math.min(MAX_SPD,this.vx));
    if(!this.onGnd)this.vy+=GRAVITY;
    this.x+=this.vx;this.y+=this.vy;
    if(this.y>=GROUND){this.y=GROUND;this.onGnd=true;this.vy=this.vy<-5?-this.vy*0.12:0;}
    if(this.x<ER+6){
      this.x=ER+6;
      if(this.vx<-2){spawnSparks(this.x,this.y-20,Math.abs(this.vx)*1.5,'#FFD700');this.vx=Math.abs(this.vx)*0.55;}
      else{this.vx=Math.abs(this.vx)*0.25;}
    }
    if(this.x>W-ER-6){
      this.x=W-ER-6;
      if(this.vx>2){spawnSparks(this.x,this.y-20,Math.abs(this.vx)*1.5,'#FFD700');this.vx=-Math.abs(this.vx)*0.55;}
      else{this.vx=-Math.abs(this.vx)*0.25;}
    }
    this.rot+=this.vx*0.042;
    if(this.hitFlash>0)this.hitFlash-=dt;
    if(this.dmgCooldown>0)this.dmgCooldown-=dt;
    if(this.hp<70)this.crackLv=1;if(this.hp<40)this.crackLv=2;if(this.hp<15)this.crackLv=3;
    if(!this.dead){
      if(this.charging)this._sa('charge');
      else if(this.anim==='superjump'&&!this.onGnd){}
      else if(!this.onGnd&&this.anim!=='superjump')this._sa('jump');
      else if(this.onGnd){
        if(this.anim==='jump'||this.anim==='superjump')this._sa('idle');
        if(Math.abs(this.vx)>0.7)this._sa('roll');
        else if(this.anim==='roll'&&Math.abs(this.vx)<0.4)this._sa('idle');
      }
      if(this.anim==='hit'&&this.hitFlash<=0)this._sa('idle');
    }
    this.frameT+=dt;
    const cfg=this.spriteCfg[this.anim]||{f:4,fps:150};
    if(this.frameT>=cfg.fps){this.frameT=0;this.frameIdx=(this.frameIdx+1)%cfg.f;}
  }
  _sa(a){if(this.anim===a)return;this.anim=a;this.frameIdx=0;this.frameT=0;}
  takeDamage(dmg,hitX,hitY,attackerIsP1){
    if(this.dead||this.dmgCooldown>0)return;
    let d=Math.round(dmg);if(d<2)return;

    // Combo multiplier — if attacker hits again within 1.2s, bonus damage
    if(attackerIsP1){
      p1ComboTimer=1200;
      p1Combo++;
      if(p1Combo>=2) d=Math.round(d*(1+Math.min(p1Combo-1,3)*0.15));
    } else {
      p2ComboTimer=1200;
      p2Combo++;
      if(p2Combo>=2) d=Math.round(d*(1+Math.min(p2Combo-1,3)*0.15));
    }

    this.hp=Math.max(0,this.hp-d);
    this.hitFlash=260;this._sa('hit');
    this.dmgCooldown=420;
    // Mark that this egg was hit (no perfect)
    if(attackerIsP1!==undefined){
      if(!attackerIsP1) p1Perfect=false; // p1 was hit
      else p2Perfect=false;              // p2 was hit
    }
    triggerShake(Math.min(d*0.6,12));
    spawnSparks(hitX||this.x, hitY||this.y-20, d, this.C.col);
    SFX.playHit(this.ci,d);
    haptic(Math.min(15+Math.round(d*1.5),55));
    if(this.hp<=0){this.dead=true;this._sa('dead');SFX.playDead(this.ci);triggerShake(18);haptic(100);}
  }
  draw(ctx){
    const c=this.C,r=ER,fW=128;
    const fh=this.hitFlash>0&&Math.floor(this.hitFlash/55)%2===0;
    const spr=this.sprites[this.anim];
    if(spr&&spr.complete&&spr.naturalWidth>0){
      // Sprite ground anchor at pixel 104/128 (82%) — offset so feet sit on this.y
      const sprOff=fW-(fW*0.82); // = 128-104 = 24px from bottom
      ctx.save();ctx.translate(this.x,this.y-sprOff);
      if(this.facing<0)ctx.scale(-1,1);
      ctx.rotate(this.rot);  // roll rotation — same as procedural
      if(fh)ctx.globalAlpha=0.35;
      ctx.drawImage(spr,this.frameIdx*fW,0,fW,fW,-fW/2,-fW/2,fW,fW);
      ctx.restore();return;
    }
    // Placeholder
    ctx.save();ctx.translate(this.x,this.y);if(fh)ctx.globalAlpha=0.35;
    ctx.save();ctx.rotate(this.rot);
    ctx.beginPath();ctx.ellipse(0,0,r*0.82,r,0,0,Math.PI*2);
    const g=ctx.createRadialGradient(-r*0.22,-r*0.3,r*0.06,0,0,r);
    g.addColorStop(0,_lx(c.col,48));g.addColorStop(0.52,c.col);g.addColorStop(1,c.shade);
    ctx.fillStyle=g;ctx.fill();
    if(this.crackLv>0){
      ctx.strokeStyle='rgba(0,0,0,0.65)';ctx.lineWidth=1.8;ctx.beginPath();
      ctx.moveTo(-4,-16);ctx.lineTo(10,3);ctx.lineTo(2,22);
      if(this.crackLv>1){ctx.moveTo(-18,0);ctx.lineTo(-7,18);ctx.moveTo(14,-12);ctx.lineTo(6,8);}
      if(this.crackLv>2){ctx.moveTo(-22,-4);ctx.lineTo(-12,18);ctx.moveTo(12,-22);ctx.lineTo(22,6);ctx.moveTo(-3,-26);ctx.lineTo(7,-2);}
      ctx.stroke();
    }
    ctx.restore();
    if(this.charging){
      const t=Math.min((Date.now()-this.chargeT)/MAX_CHARGE_MS,1);
      const p=(Math.sin(Date.now()*0.015)+1)*0.5;
      ctx.globalAlpha=(0.12+t*0.48)*(0.7+p*0.3);
      const gr=ctx.createRadialGradient(0,0,r*0.35,0,0,r*(1.3+t*0.55));
      gr.addColorStop(0,'#FFE030');gr.addColorStop(0.45,'rgba(255,180,0,0.55)');gr.addColorStop(1,'rgba(255,100,0,0)');
      ctx.fillStyle=gr;ctx.beginPath();ctx.arc(0,0,r*(1.3+t*0.55)*1.3,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
      const bw=68,bh=7;ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(-bw/2,r+9,bw,bh);
      const bg=ctx.createLinearGradient(-bw/2,0,bw/2,0);
      bg.addColorStop(0,'#FFD700');bg.addColorStop(1,'#FF6600');
      ctx.fillStyle=bg;ctx.fillRect(-bw/2,r+9,bw*t,bh);
    }
    if(this.dead){
      for(let i=0;i<8;i++){
        const ang=(i/8)*Math.PI*2+(Date.now()*0.0008);
        ctx.fillStyle=c.col;ctx.beginPath();
        ctx.ellipse(Math.cos(ang)*r*0.9,Math.sin(ang)*r*0.9,6,10,ang,0,Math.PI*2);ctx.fill();
      }
    }
    ctx.globalAlpha=1;ctx.restore();
  }
}
function _lx(hex,a){const n=parseInt(hex.replace('#',''),16);return`rgb(${Math.min(255,(n>>16)+a)},${Math.min(255,((n>>8)&255)+a)},${Math.min(255,(n&255)+a)})`;}

class AI{

    this._chHold = 0;
    this.chDir = 1;

    this._patrolDir = 1;

    // Personality traits per character
    const P = [

      {aggr:0.70, speed:0.80,chargeMul:1.6, jumpFreq:0.001, name:'heavy'},    // Bruno — slow but big charge
      {aggr:0.45, speed:1.30,chargeMul:0.7, jumpFreq:0.007, name:'agile'},    // Alba — quick, lots of jumps
      {aggr:0.80, speed:0.95,chargeMul:1.4, jumpFreq:0.002, name:'aggressive'},// Nero
      {aggr:0.50, speed:1.10,chargeMul:1.1, jumpFreq:0.004, name:'technical'},  // Azure
      {aggr:0.75, speed:1.05,chargeMul:1.3, jumpFreq:0.003, name:'offensive'}, // Rosso
    ];
    this.P = P[ci % 6];
  }

  update(me, foe, dt){
    this.timer        -= dt;
    this._retreatTimer = Math.max(0, this._retreatTimer - dt);
    this._patrolTimer -= dt;
    const i = {l:false, r:false, u:false, d:false};
    if(me.dead || foe.dead) return i;

    const dx   = foe.x - me.x;
    const dist = Math.abs(dx);

    // ── Difficulty scaling ──────────────────────────────
    // react: how often AI reassesses (ms). Starts slow, gets fast.
    const react     = Math.max(80, 700 - this.d * 48);
    // aggression: chance to attack when in good position
    const baseAggr  = this.P.aggr;
    const scaledAggr= Math.min(baseAggr, 0.10 + this.d * 0.07);
    // approach speed multiplier
    const spd = this.P.speed;

    // ── Corner escape ───────────────────────────────────
    const nearLeft  = me.x < 100;
    const nearRight = me.x > W - 100;
    const beingPinned = (nearLeft && dx < 0) || (nearRight && dx > 0);
    if(beingPinned && this._retreatTimer <= 0){
      this.state = 'retreat';
      this._retreatTimer = 900;
      this.timer = 0;
    }

    // ── Detect incoming charge (evade) ──────────────────
    const foeCharging = foe.charging || (foe.anim === 'superjump' && !foe.onGnd);
    const foeComingFast = Math.abs(foe.vx) > 6 && Math.sign(foe.vx) === Math.sign(dx) * -1;
    if(foeCharging && dist < 200 && this._retreatTimer <= 0 && this.d >= 2){
      this.state = 'retreat';
      this._retreatTimer = 600;
      this.timer = 0;
    }

    // ── State decision ──────────────────────────────────
    if(this.timer <= 0 && this._retreatTimer <= 0){
      const roll = Math.random();
      const tooClose   = dist < 75;
      const idealRange = dist >= 130 && dist <= 380;
      const farAway    = dist > 380;

      if(tooClose){
        this.state = 'retreat';
        this._retreatTimer = 500 + Math.random()*300;
      } else if(roll < scaledAggr && me.onGnd && idealRange){
        // Attack!
        this.state  = 'charge_prep';
        this.chDir  = dx > 0 ? 1 : -1;
        // Hold time based on difficulty + personality
        const baseHold = 350 + this.P.chargeMul * 180;
        this._chHold = baseHold + this.d * 80 + Math.random() * 180;
      } else if(farAway || roll < 0.70){
        // Hunt the player — the default active state
        this.state = 'stalk';
      } else {
        this.state = 'patrol';
      }
      this.timer = react + Math.random() * react * 0.4;
    }

    // ── Execute state ────────────────────────────────────

    if(this.state === 'stalk'){
      // Move toward player, but keep a comfortable gap (65px)
      // This gap shrinks at higher difficulty
      const gap = Math.max(65, 130 - this.d * 8);
      if(dist > gap){
        if(dx > 0) i.r = true; else i.l = true;
      } else {
        // Close enough — do a mini bounce-back, prepare for charge
        this.state = 'charge_prep';
        this.chDir = dx > 0 ? 1 : -1;
        this._chHold = 250 + this.d * 60 + Math.random() * 150;
      }
      // Random jumps while stalking (personality-based)
      if(Math.random() < this.P.jumpFreq * Math.max(this.d, 0.5) && me.onGnd)
        i.u = true;

    } else if(this.state === 'patrol'){
      // Patrol back and forth — active even when not attacking
      if(this._patrolTimer <= 0){
        this._patrolDir *= -1;
        this._patrolTimer = 600 + Math.random() * 800;
        // Drift toward center
        if((this._patrolDir < 0 && me.x < W * 0.35) ||
           (this._patrolDir > 0 && me.x > W * 0.65)){
          this._patrolDir *= -1;
        }
      }
      if(this._patrolDir > 0) i.r = true; else i.l = true;
      // After patrolling, often switch to stalking
      if(this.timer <= 0) this.state = 'stalk';

    } else if(this.state === 'retreat'){
      // Move away from player, prefer arena center
      if(dx > 0) i.l = true; else i.r = true;
      // Jump to escape if cornered
      if((nearLeft || nearRight) && me.onGnd && Math.random() < 0.05)
        i.u = true;

    } else if(this.state === 'charge_prep'){
      if(me.onGnd){
        i.d = true;
        if(this.chDir > 0) i.r = true; else i.l = true;
        this._chHold -= dt;
        if(this._chHold <= 0){
          i.d = false;
          // After attacking, retreat briefly
          this.state = 'retreat';
          this._retreatTimer = 400 + Math.random() * 300;
        }
      } else {
        // In air — steer toward foe
        if(dx > 30) i.r = true; else if(dx < -30) i.l = true;
      }
    }

    return i;
  }
}

//  FIGHT
// ════════════════════════════════════════════════
let p1=null,p2=null,aiCtrl=null,fightSec=99,fightMs=0;

function initFight(){
  p1=new Egg(210,p1ci,1);p2=new Egg(W-210,p2ci,-1);
  fightSec=99;fightMs=0;rndEnd=false;rndMsg='';rndTimer=0;
  matchDone=false;chargeLastSfx=0;
  _prevP1u=false;_prevP2u=false;
  _gPrevP1hp=MAX_HP;_gPrevP2hp=MAX_HP;
  _gPrevP1dead=false;_gPrevP2dead=false;_gPrevRndEnd=false;_gPrevCd=0;
  if(mode==='single')aiCtrl=new AI(aiDiff(stage), p2ci);
  particles.length=0; shakePow=0;
  p1Perfect=true; p2Perfect=true;
  p1Combo=0; p1ComboTimer=0;
  p2Combo=0; p2ComboTimer=0;
  SFX.switchBGM('fight');
  startCountdown();
  scr='FIGHT';
  updateMobileUI();
}
function collide(a,b){
  const dx=b.x-a.x,dy=b.y-a.y,dist=Math.sqrt(dx*dx+dy*dy),minD=ER*1.62;
  if(dist>=minD||dist<0.1)return;
  const nx=dx/dist,ny=dy/dist;
  // Velocity of each egg projected TOWARD the other (approach component)
  // Positive = moving toward opponent, negative = moving away
  const aApproach =  a.vx*nx + a.vy*ny;   // a moving toward b
  const bApproach = -b.vx*nx - b.vy*ny;   // b moving toward a
  const relV=Math.sqrt((a.vx-b.vx)**2+(a.vy-b.vy)**2);
  const midX=(a.x+b.x)/2, midY=(a.y+b.y)/2-20;
  if(relV>4.5){
    // Only deal damage if actually approaching the opponent (not bouncing away)
    // b takes damage from a's approach speed — a hit b
    if(aApproach>2.5) b.takeDamage(aApproach*DMG_MULT, midX, midY, true);
    // a takes damage from b's approach speed — b hit a
    if(bApproach>2.5) a.takeDamage(bApproach*DMG_MULT, midX, midY, false);
    const bo=relV*0.44;
    a.vx=-nx*bo*0.88;a.vy=-ny*bo*0.48;b.vx=nx*bo*0.88;b.vy=ny*bo*0.48;
    a.onGnd=false;b.onGnd=false;
  }else{
    const ov=(minD-dist)*0.5+0.5;
    a.x-=nx*ov;b.x+=nx*ov;
    const sep=0.3;
    a.vx-=nx*sep;b.vx+=nx*sep;
  }
}
function updateFight(dt){
  // Screen shake decay (both sides)
  if(shakePow>0){
    shakePow*=0.80;
    shakeX=(Math.random()-0.5)*shakePow;
    shakeY=(Math.random()-0.5)*shakePow;
    if(shakePow<0.3){shakePow=0;shakeX=0;shakeY=0;}
  }
  updateParticles(dt);

  // ── GUEST: local extrapolation for smooth rendering ──────────
  if(mode==='multi'&&!isHost){
    // Send inputs to host every frame
    if(conn&&conn.open) conn.send({t:'inp',i:{l:K.l,r:K.r,u:K.u,d:K.d}});

    // Skip physics if no eggs yet or game not running
    if(!p1||!p2||cdActive||rndEnd||matchDone)return;

    // Lightweight local physics (no collision/AI — just keep motion smooth)
    [p1,p2].forEach(e=>{
      if(e.dead)return;
      e.vx*=Math.pow(FRICTION,dt/16);
      if(!e.onGnd)e.vy+=GRAVITY*(dt/16);
      e.x+=e.vx*(dt/16); e.y+=e.vy*(dt/16);
      if(e.y>=GROUND){e.y=GROUND;e.onGnd=true;e.vy=0;}
      e.rot+=e.vx*0.042*(dt/16);
      e.frameT+=dt;
      const cfg=e.spriteCfg[e.anim]||{f:4,fps:150};
      if(e.frameT>=cfg.fps){e.frameT=0;e.frameIdx=(e.frameIdx+1)%cfg.f;}
    });
    return;
  }

  // ── HOST + SINGLE PLAYER: authoritative simulation ────────────
  if(cdActive){
    cdTimer-=dt;
    if(cdTimer<=0){
      cdCount--;
      if(cdCount>0){cdTimer=700;SFX.playCountdown();}
      else{cdActive=false;SFX.playRoundStart();}
    }
    if(mode==='multi'&&conn&&conn.open)conn.send(hostSerializeState());
    return;
  }

  if(matchDone)return;
  if(rndEnd){
    rndTimer-=dt;
    if(rndTimer<=0){
      rndEnd=false;
      if(rw[0]>=ROUNDS_WIN||rw[1]>=ROUNDS_WIN){endMatch(rndWinner);}
      else{
        p1=new Egg(210,p1ci,1);p2=new Egg(W-210,p2ci,-1);
        fightSec=99;fightMs=0;particles.length=0;
        p1Perfect=true;p2Perfect=true;
        p1Combo=0;p1ComboTimer=0;p2Combo=0;p2ComboTimer=0;
        if(mode==='single')aiCtrl=new AI(aiDiff(stage),p2ci);
        startCountdown();
      }
    }
    if(mode==='multi'&&conn&&conn.open)conn.send(hostSerializeState());
    return;
  }

  fightMs+=dt;
  p1ComboTimer=Math.max(0,p1ComboTimer-dt);if(p1ComboTimer<=0)p1Combo=0;
  p2ComboTimer=Math.max(0,p2ComboTimer-dt);if(p2ComboTimer<=0)p2Combo=0;
  if(fightMs>=1000){fightMs-=1000;fightSec=Math.max(0,fightSec-1);if(fightSec<=10&&fightSec>0)SFX.playCountdown();}
  if(fightSec<=0){endRound(p1.hp>p2.hp?'P1':p2.hp>p1.hp?'P2':'DRAW');return;}

  const myInp={l:K.l,r:K.r,u:K.u,d:K.d};
  let p1i,p2i;
  if(mode==='single'){p1i=myInp;p2i=aiCtrl.update(p2,p1,dt);}
  else{p1i=myInp;p2i=remInp;} // host=p1, guest=p2

  const p1u=p1i.u&&!_prevP1u,p2u=p2i.u&&!_prevP2u;
  _prevP1u=p1i.u;_prevP2u=p2i.u;

  p1.update(p1i.l,p1i.r,p1u,p1i.d,dt,true);
  p2.update(p2i.l,p2i.r,p2u,p2i.d,dt,false);
  collide(p1,p2);
  if(p1.dead||p2.dead)endRound(p1.dead?'P2':'P1');

  if(mode==='multi'&&conn&&conn.open)conn.send(hostSerializeState());
}

// ── Round message — perspective correct on each client ───────────
function getRndMsg(winner){
  if(winner==='DRAW')return'DRAW!';
  if(mode==='single')return winner==='P1'?'PLAYER 1 WINS!':'PLAYER 2 WINS!';
  const iWon=(winner==='P1'&&isHost)||(winner==='P2'&&!isHost);
  return iWon?'ΕΣΥ ΚΕΡΔΙΣΕΣ! 🏆':'Ο ΑΝΤΙΠΑΛΟΣ ΚΕΡΔΙΣΕ';
}

// ── Host serializes full authoritative state ──────────────────────
function hostSerializeState(){
  const e2o=e=>({
    x:+e.x.toFixed(1),y:+e.y.toFixed(1),
    vx:+e.vx.toFixed(2),vy:+e.vy.toFixed(2),
    hp:e.hp,cl:e.crackLv,fc:e.facing,
    rot:+e.rot.toFixed(3),an:e.anim,fi:e.frameIdx,
    hf:Math.round(e.hitFlash),dead:e.dead?1:0,
    ch:e.charging?1:0,onG:e.onGnd?1:0,
    // Charge elapsed (0-1) so guest can render glow correctly
    cT:e.charging?+Math.min((Date.now()-e.chargeT)/MAX_CHARGE_MS,1).toFixed(2):0
  });
  return{
    t:'st',p1:e2o(p1),p2:e2o(p2),
    sec:fightSec,rw:rw,
    re:rndEnd?1:0,rv:rndWinner,
    md:matchDone?1:0,mw:_mpMatchWinner,
    cd:cdActive?cdCount:0,
    c1:p1Combo,c2:p2Combo,
    pp1:p1Perfect?1:0,pp2:p2Perfect?1:0
  };
}

// ── Guest: apply host state with lerp for smooth positions ────────
let _gPrevP1hp=MAX_HP,_gPrevP2hp=MAX_HP;
let _gPrevP1dead=false,_gPrevP2dead=false,_gPrevRndEnd=false,_gPrevCd=0;
let _gSfxWinAt=0,_gSfxDeadAt=0; // debounce timers (ms)
function guestApplyState(d){
  if(!p1||!p2)return;
  const now=Date.now();

  // ── Non-positional state — apply directly ─────
  p1.hp=d.p1.hp; p1.crackLv=d.p1.cl; p1.facing=d.p1.fc;
  p1.hitFlash=d.p1.hf; p1.dead=d.p1.dead===1;
  p1.charging=d.p1.ch===1; p1.onGnd=d.p1.onG===1;
  if(p1.charging) p1.chargeT=Date.now()-d.p1.cT*MAX_CHARGE_MS;
  if(p1.anim!==d.p1.an){p1.anim=d.p1.an;p1.frameIdx=d.p1.fi;p1.frameT=0;}

  p2.hp=d.p2.hp; p2.crackLv=d.p2.cl; p2.facing=d.p2.fc;
  p2.hitFlash=d.p2.hf; p2.dead=d.p2.dead===1;
  p2.charging=d.p2.ch===1; p2.onGnd=d.p2.onG===1;
  if(p2.charging) p2.chargeT=Date.now()-d.p2.cT*MAX_CHARGE_MS;
  if(p2.anim!==d.p2.an){p2.anim=d.p2.an;p2.frameIdx=d.p2.fi;p2.frameT=0;}

  // ── Positions — lerp to avoid jumps ───────────
  const lerp=(cur,tgt,vel)=>{
    const err=Math.abs(tgt-cur);
    if(err>80)return tgt;           // snap if too far off
    return cur+(tgt-cur)*0.35;      // gentle lerp otherwise
  };
  if(!p1.dead){p1.x=lerp(p1.x,d.p1.x,d.p1.vx);p1.y=lerp(p1.y,d.p1.y,d.p1.vy);}
  else{p1.x=d.p1.x;p1.y=d.p1.y;}
  if(!p2.dead){p2.x=lerp(p2.x,d.p2.x,d.p2.vx);p2.y=lerp(p2.y,d.p2.y,d.p2.vy);}
  else{p2.x=d.p2.x;p2.y=d.p2.y;}
  // Always sync velocity (used for extrapolation next frame)
  p1.vx=d.p1.vx;p1.vy=d.p1.vy;
  p2.vx=d.p2.vx;p2.vy=d.p2.vy;

  // ── Game state ────────────────────────────────
  fightSec=d.sec; rw=d.rw;
  const newRndEnd=d.re===1;
  rndWinner=d.rv;
  matchDone=d.md===1; _mpMatchWinner=d.mw||'';
  cdActive=d.cd>0; cdCount=d.cd;
  p1Combo=d.c1||0; p2Combo=d.c2||0;
  if(d.pp1!==undefined){p1Perfect=d.pp1===1; p2Perfect=d.pp2===1;}

  // ── Guest SFX — detect changes, debounced ─────
  const dmg1=_gPrevP1hp-d.p1.hp, dmg2=_gPrevP2hp-d.p2.hp;
  if(dmg1>2&&!_gPrevP1dead){
    triggerShake(dmg1*0.6);spawnSparks(p1.x,p1.y-20,dmg1,CHARS[p1ci].col);
    SFX.playHit(p1ci,dmg1);
  }
  if(dmg2>2&&!_gPrevP2dead){
    triggerShake(dmg2*0.6);spawnSparks(p2.x,p2.y-20,dmg2,CHARS[p2ci].col);
    SFX.playHit(p2ci,dmg2);
  }
  if(d.p1.dead&&!_gPrevP1dead&&now-_gSfxDeadAt>800){SFX.playDead(p1ci);_gSfxDeadAt=now;}
  if(d.p2.dead&&!_gPrevP2dead&&now-_gSfxDeadAt>800){SFX.playDead(p2ci);_gSfxDeadAt=now;}
  // Round win sound — debounced 3s so bursts of packets don't re-trigger
  if(newRndEnd&&!_gPrevRndEnd&&now-_gSfxWinAt>3000){
    rndMsg=getRndMsg(d.rv);  // compute message from THIS client's perspective
    SFX.playWin();_gSfxWinAt=now;
  }else if(newRndEnd&&!_gPrevRndEnd){
    rndMsg=getRndMsg(d.rv);  // still update message even if not playing sound
  }
  if(!newRndEnd&&_gPrevRndEnd) rndMsg=''; // clear when round resets
  rndEnd=newRndEnd;

  // Countdown sound
  if(d.cd>0&&_gPrevCd!==d.cd)SFX.playCountdown();
  if(d.cd===0&&_gPrevCd>0)SFX.playRoundStart();

  _gPrevP1hp=d.p1.hp;_gPrevP2hp=d.p2.hp;
  _gPrevP1dead=d.p1.dead===1;_gPrevP2dead=d.p2.dead===1;
  _gPrevRndEnd=newRndEnd;_gPrevCd=d.cd;

  // Screen transitions
  if(d.md&&scr==='FIGHT'){SFX.stopAllSFX();SFX.stopBGM();scr='MATCHOVER';updateMobileUI();}
}
function endRound(winner){
  rndWinner=winner;
  if(winner==='DRAW'){
    rndMsg='DRAW!';
    rndEnd=true;rndTimer=2000;
    // No win jingle on draw — just a quiet beep
    if(typeof SFX!=='undefined')SFX.playCountdown();
  }else{
    if(winner==='P1')rw[0]++; else rw[1]++;
    rndMsg=getRndMsg(winner);
    rndEnd=true;rndTimer=2600;SFX.playWin();haptic([60,25,60]);
  }
}
function endMatch(winner){
  matchDone=true;
  SFX.stopAllSFX();
  SFX.stopBGM();
  _mpMatchWinner=winner;
  if(mode==='single'){
    if(winner==='P1'){streak++;if(streak>hs)hs=streak;stage++;p2ci=randOpponent(p1ci);scr='STGCLEAR';SFX.playWin();}
    else{scr='GAMEOVER';collectNick=true;nickInput='';SFX.playLose();
      if(isTouchDev())showNickOverlay();}
  }else{
    scr='MATCHOVER';mpR1=false;mpR2=false;rw=[0,0];
  }
  updateMobileUI();
}

// ════════════════════════════════════════════════
//  PEERJS — with proper STUN/ICE for cross-network
// ════════════════════════════════════════════════
const PEER_CFG = {
  config: {
    iceServers: [
      {urls:'stun:stun.l.google.com:19302'},
      {urls:'stun:stun1.l.google.com:19302'},
      {urls:'stun:stun2.l.google.com:19302'},
      {urls:'stun:stun.cloudflare.com:3478'},
      {urls:'stun:global.stun.twilio.com:3478'},
    ]
  },
  debug: 0
};

function initPeer(host){
  isHost=host; mpState='peer_init'; mpErr='';
  myPeerId=null; mpR1=false; mpR2=false;
  peer=new Peer(undefined, PEER_CFG);
  peer.on('open',id=>{
    myPeerId=id;
    mpState=isHost?'waiting_guest':'connecting';
  });
  peer.on('connection',c=>{
    conn=c; setupConn();
  });
  peer.on('error',e=>{
    console.error('[PeerJS] Error:', e.type, e);
    mpState='error';
    const types={
      'peer-unavailable':'Ο host δεν βρέθηκε.\nΒεβαιώσου ότι ο host έχει το παιχνίδι ανοιχτό.',
      'network':'Πρόβλημα δικτύου. Έλεγξε τη σύνδεσή σου.',
      'server-error':'Πρόβλημα με τον PeerJS server. Δοκίμασε ξανά.',
      'socket-error':'Σφάλμα socket. Δοκίμασε ξανά.',
      'socket-closed':'Η σύνδεση έκλεισε απροσδόκητα.',
      'unavailable-id':'ID μη διαθέσιμο.',
      'ssl-unavailable':'SSL error.',
    };
    mpErr=types[e.type]||`Σφάλμα: ${e.type||'άγνωστο'}`;
  });
  peer.on('disconnected',()=>{
    // Do NOT auto-reconnect — it can assign a different peer ID, breaking the shared link
    console.warn('[PeerJS] Disconnected from signaling server');
  });
}

function connectToPeer(id){
  if(!peer)return;
  mpState='connecting'; mpErr='';
  conn=peer.connect(id,{reliable:true,serialization:'json'});
  setupConn();
  if(_mpTimeout)clearTimeout(_mpTimeout);
  _mpTimeout=setTimeout(()=>{
    if(mpState==='connecting'){
      mpState='error';
      mpErr='Timeout — ο host δεν απάντησε.\nΒεβαιώσου ότι ο host έχει το παιχνίδι ανοιχτό στον browser.';
    }
  },15000);
}

function setupConn(){
  conn.on('open',()=>{
    mpState='connected';
    if(_mpTimeout){clearTimeout(_mpTimeout);_mpTimeout=null;}
    // Exchange initial state
    const myIdx=isHost?p1ci:p2ci;
    conn.send({t:'char',i:myIdx});
  });
  conn.on('data',data=>{
    if(data.t==='inp')  remInp=data.i;           // host receives guest inputs
    else if(data.t==='st') guestApplyState(data); // guest receives host state
    else if(data.t==='char'){
      if(isHost)p2ci=data.i; else p1ci=data.i;
    }
    else if(data.t==='rdy'){
      if(data.host)mpR1=data.v; else mpR2=data.v;
      checkReady();
    }
  });
  conn.on('error',e=>{
    console.error('[PeerJS] Conn error:',e);
    mpState='error'; mpErr='Η σύνδεση έκλεισε με σφάλμα.';
  });
  conn.on('close',()=>{
    console.warn('[PeerJS] Connection closed, scr='+scr);
    mpState='waiting_guest'; // host goes back to waiting if peer reconnects
    if(scr==='FIGHT'){
      rndMsg='Ο αντίπαλος αποσυνδέθηκε!';
      rndEnd=true; rndTimer=2600;
      setTimeout(()=>endMatch(isHost?'P1':'P2'),2700);
    }else if(scr==='MPLOBY'||scr==='MATCHOVER'){
      mpState='error'; mpErr='Η σύνδεση έκλεισε.';
    }
  });
}

function closePeer(){
  if(_mpTimeout)clearTimeout(_mpTimeout);
  if(conn){try{conn.close();}catch(e){}}
  if(peer){try{peer.destroy();}catch(e){}}
  conn=null;peer=null;myPeerId=null;
  mpR1=false;mpR2=false;mpState='idle';mpErr='';
}

function mpRetry(){
  closePeer();
  if(isHost){initPeer(true);}
  else{
    const r=new URLSearchParams(window.location.search).get('room');
    if(r){
      initPeer(false);
      peer.on('open',()=>connectToPeer(r));
    }else{scr='MODE';updateMobileUI();}
  }
}

// ════════════════════════════════════════════════
function _rr(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function _btn(x,y,w,h,txt,col,glow){
  ctx.save();
  if(glow){ctx.shadowBlur=18;ctx.shadowColor=glow;}
  _rr(x,y,w,h,10);ctx.fillStyle=col;ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.beginPath();ctx.moveTo(x+10,y);ctx.lineTo(x+w-10,y);ctx.quadraticCurveTo(x+w,y,x+w,y+10);
  ctx.lineTo(x+w,y+h*0.45);ctx.lineTo(x,y+h*0.45);ctx.lineTo(x,y+10);ctx.quadraticCurveTo(x,y,x+10,y);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=1.5;_rr(x,y,w,h,10);ctx.stroke();
  ctx.shadowBlur=0;ctx.fillStyle='white';ctx.font=`bold 15px 'JetBrains Mono',monospace`;
  ctx.textAlign='center';ctx.fillText(txt,x+w/2,y+h/2+7);ctx.restore();
}
function _corner(x,y,sz,flip){
  const sx=flip?-1:1;
  ctx.save();ctx.translate(x,y);ctx.scale(sx,1);
  ctx.beginPath();ctx.moveTo(0,sz);ctx.lineTo(0,0);ctx.lineTo(sz,0);
  ctx.strokeStyle='rgba(155,48,255,0.6)';ctx.lineWidth=2;ctx.stroke();ctx.restore();
}
function _diamond(cx,cy,r,col){
  ctx.save();
  if(col!=='rgba(255,255,255,0.15)'){ctx.shadowBlur=8;ctx.shadowColor=col;}
  ctx.fillStyle=col;ctx.beginPath();
  ctx.moveTo(cx,cy-r);ctx.lineTo(cx+r,cy);ctx.lineTo(cx,cy+r);ctx.lineTo(cx-r,cy);ctx.closePath();
  ctx.fill();ctx.restore();
}

function drawBG(){
  const M=MAP_CFG[getMapIdx()];

  // Sky
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,M.sky[0]);sky.addColorStop(0.6,M.sky[1]);sky.addColorStop(1,M.sky[2]);
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  // Center radial glow
  const cr=ctx.createRadialGradient(W/2,GROUND-60,30,W/2,GROUND-60,340);
  cr.addColorStop(0,M.radial);cr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=cr;ctx.fillRect(0,0,W,H);

  // Perspective floor grid
  ctx.save();
  for(let i=0;i<12;i++){
    const t=i/11,y=GROUND+8+t*(H-GROUND-8),alpha=M.gridAlpha[0]+t*(M.gridAlpha[1]-M.gridAlpha[0]);
    ctx.strokeStyle=M.gridCol+alpha+')';ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }
  const vx=W/2,vy=GROUND+2;
  for(let i=0;i<=24;i++){
    const x=(i/24)*W,t=Math.abs(i/24-0.5)*2;
    const alpha=(M.gridAlpha[0]+t*(M.gridAlpha[1]-M.gridAlpha[0]))*0.6;
    ctx.strokeStyle=M.gridCol+alpha+')';ctx.lineWidth=0.7;
    ctx.beginPath();ctx.moveTo(vx,vy);ctx.lineTo(x,H);ctx.stroke();
  }
  ctx.restore();

  // Ground neon line — character's glow color
  ctx.save();
  ctx.shadowBlur=22;ctx.shadowColor=M.glowOuter;
  ctx.strokeStyle=M.glowOuter;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,GROUND);ctx.lineTo(W,GROUND);ctx.stroke();
  ctx.shadowBlur=0;ctx.strokeStyle=M.glowInner;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,GROUND-1);ctx.lineTo(W,GROUND-1);ctx.stroke();
  ctx.restore();

  // Ground surface
  const gnd=ctx.createLinearGradient(0,GROUND,0,H);
  gnd.addColorStop(0,M.ground[0]);gnd.addColorStop(1,M.ground[1]);
  ctx.fillStyle=gnd;ctx.fillRect(0,GROUND,W,H-GROUND);

  // BG pillars
  for(let i=0;i<4;i++){
    const px=80+i*265,pw=18,ph=120+i%2*30;
    ctx.fillStyle=M.pillars[0].replace('#','rgba(').replace(/(..)(..)(..)/, (_,r,g,b)=>`rgba(${parseInt(r,16)},${parseInt(g,16)},${parseInt(b,16)},`)+M.pillarAlpha[0]+')';
    // Simpler: just use opacity
    ctx.save();ctx.globalAlpha=M.pillarAlpha[0];
    ctx.fillStyle=M.pillars[0];ctx.fillRect(px,GROUND-ph,pw,ph);
    ctx.globalAlpha=M.pillarAlpha[1];
    ctx.fillStyle=M.pillars[1];ctx.fillRect(px-6,GROUND-ph*0.6,pw+12,ph*0.6);
    ctx.restore();
  }

  // Map name watermark (stage number only — subtle background)
  if(mode==='single'){
    ctx.fillStyle='rgba(255,255,255,0.04)';
    ctx.font=`bold 40px 'Press Start 2P',monospace`;ctx.textAlign='center';
    ctx.fillText(`${stage}`,W/2,GROUND+10);
  }
}

function drawHUD(){
  const bw=300,bh=34,by=30,p1x=12,p2x=W-bw-12;
  const c1=CHARS[p1ci],c2=CHARS[p2ci];

  // ── Health bars ───────────────────────────────────────────────────
  drawHBar(p1x,by,bw,bh,p1.hp/MAX_HP,c1.col,'l');
  drawHBar(p2x,by,bw,bh,p2.hp/MAX_HP,c2.col,'r');

  // ── Character names ───────────────────────────────────────────────
  ctx.save();
  // P1 name — left-aligned, above bar
  ctx.font=`bold 11px 'JetBrains Mono',monospace`;
  ctx.fillStyle='white';ctx.textAlign='left';
  ctx.shadowBlur=8;ctx.shadowColor=c1.col;
  ctx.fillText(c1.name,p1x+4,by-7);
  // P2 name — right-aligned, above bar
  ctx.shadowColor=c2.col;ctx.textAlign='right';
  ctx.fillText(c2.name,p2x+bw-4,by-7);
  ctx.shadowBlur=0;ctx.restore();

  // ── HP numbers — outside the bars, larger ─────────────────────────
  ctx.save();
  ctx.font=`bold 15px 'JetBrains Mono',monospace`;
  ctx.fillStyle='rgba(255,255,255,0.75)';
  ctx.textAlign='left'; ctx.fillText(Math.ceil(Math.max(0,p1.hp)),p1x+bw+8,by+bh-3);
  ctx.textAlign='right';ctx.fillText(Math.ceil(Math.max(0,p2.hp)),p2x-8,by+bh-3);
  ctx.restore();

  // ── Round win diamonds ────────────────────────────────────────────
  for(let i=0;i<ROUNDS_WIN;i++){
    _diamond(p1x+10+i*22,by+bh+14,7,i<rw[0]?c1.col:'rgba(255,255,255,0.15)');
    _diamond(p2x+bw-10-i*22,by+bh+14,7,i<rw[1]?c2.col:'rgba(255,255,255,0.15)');
  }

  // ── Corner accents ────────────────────────────────────────────────
  _corner(p1x,by,12,false);_corner(p1x+bw,by,12,true);
  _corner(p2x,by,12,false);_corner(p2x+bw,by,12,true);

  // ── Timer (center) ────────────────────────────────────────────────
  const ts=fightSec;
  const tc=ts<=10?`rgba(255,${Math.floor(100*ts/10)},20,1)`:'rgba(255,255,255,0.95)';
  ctx.save();
  _rr(W/2-34,8,68,58,8);ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fill();
  ctx.strokeStyle='rgba(155,48,255,0.45)';ctx.lineWidth=1.5;_rr(W/2-34,8,68,58,8);ctx.stroke();
  ctx.fillStyle=tc;ctx.font=`bold 22px 'JetBrains Mono',monospace`;ctx.textAlign='center';
  if(ts<=10){ctx.shadowBlur=18;ctx.shadowColor='#FF3300';}
  ctx.fillText(ts,W/2,8+58/2+9);ctx.restore();

  // ── Stage / Streak info (below timer) ─────────────────────────────
  if(mode==='single'){
    ctx.fillStyle='rgba(255,255,255,0.38)';
    ctx.font=`11px 'JetBrains Mono',monospace`;ctx.textAlign='center';
    ctx.fillText(`STAGE ${stage}  ·  STREAK ${streak}  ·  BEST ${hs}`,W/2,80);
  }

  // ── Combo display ─────────────────────────────────────────────────
  if(p1Combo>=2){
    ctx.save();ctx.textAlign='left';
    ctx.font=`bold 13px 'JetBrains Mono',monospace`;
    ctx.fillStyle='#FFD700';ctx.shadowBlur=10;ctx.shadowColor='#FFD700';
    ctx.fillText(`×${p1Combo} COMBO!`,p1x,by+bh+36);ctx.restore();
  }
  if(p2Combo>=2){
    ctx.save();ctx.textAlign='right';
    ctx.font=`bold 13px 'JetBrains Mono',monospace`;
    ctx.fillStyle=c2.col;ctx.shadowBlur=10;ctx.shadowColor=c2.col;
    ctx.fillText(`×${p2Combo} COMBO!`,p2x+bw,by+bh+36);ctx.restore();
  }

  // ── Round end banner ──────────────────────────────────────────────
  if(rndEnd&&rndMsg){
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.52)';ctx.fillRect(0,0,W,H);
    const p1won=rndWinner==='P1',p2won=rndWinner==='P2';
    const showPerf=(p1won&&p1Perfect)||(p2won&&p2Perfect);
    const banH=showPerf?110:88;
    ctx.fillStyle='rgba(16,0,34,0.92)';ctx.fillRect(0,H/2-banH/2,W,banH);
    ctx.strokeStyle='rgba(155,48,255,0.5)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(0,H/2-banH/2);ctx.lineTo(W,H/2-banH/2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,H/2+banH/2);ctx.lineTo(W,H/2+banH/2);ctx.stroke();
    ctx.textAlign='center';
    if(showPerf){
      ctx.font=`bold 14px 'Press Start 2P',monospace`;
      ctx.fillStyle='#00FFAA';ctx.shadowBlur=14;ctx.shadowColor='#00FFAA';
      ctx.fillText('✦  PERFECT  ✦',W/2,H/2-32);ctx.shadowBlur=0;
      ctx.font=`bold 16px 'Press Start 2P',monospace`;
    }else{
      ctx.font=`bold 16px 'Press Start 2P',monospace`;
    }
    ctx.fillStyle='#FFD700';ctx.shadowBlur=22;ctx.shadowColor='#FFD700';
    ctx.fillText(rndMsg,W/2,showPerf?H/2+26:H/2+20);
    ctx.shadowBlur=0;ctx.restore();
  }
}
function drawHBar(x,y,w,h,ratio,col,dir){
  // No background bar — just the fill directly
  const fw=w*Math.max(0,ratio), fx=dir==='r'?x+w-fw:x;
  if(fw>0){
    ctx.fillStyle=col; ctx.fillRect(fx,y,fw,h);
    // Top shine
    ctx.fillStyle='rgba(255,255,255,0.22)'; ctx.fillRect(fx,y,fw,Math.ceil(h*0.3));
    // Danger pulse
    if(ratio<0.28){
      ctx.fillStyle=`rgba(255,60,0,${0.22+0.18*Math.sin(Date.now()*0.014)})`;
      ctx.fillRect(fx,y,fw,h);
    }
    // Segment dividers
    ctx.strokeStyle='rgba(0,0,0,0.30)'; ctx.lineWidth=1;
    for(let s=1;s<10;s++){
      const sx=dir==='l'?x+s*(w/10):x+w-s*(w/10);
      if(dir==='l'&&sx>fx+fw)break; if(dir==='r'&&sx<fx)break;
      ctx.beginPath(); ctx.moveTo(sx,y); ctx.lineTo(sx,y+h); ctx.stroke();
    }
  }
  // Outer border only — no inner background rect
  ctx.strokeStyle=col+'55'; ctx.lineWidth=1.5; ctx.strokeRect(x,y,w,h);
}

  ctx.fillStyle='rgba(5,0,15,0.82)';_rr(x,y,bw,bh,10);ctx.fill();

  ctx.strokeStyle='rgba(155,48,255,0.35)';ctx.lineWidth=1;_rr(x,y,bw,bh,10);ctx.stroke();

  // Header
  ctx.fillStyle='#FFD700';ctx.font=`bold 13px 'JetBrains Mono',monospace`;ctx.textAlign='left';
  ctx.fillText('ΠΛΗΚΤΡΑ / CONTROLS',x+16,y+18);
  ctx.strokeStyle='rgba(155,48,255,0.3)';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(x+10,y+26);ctx.lineTo(x+bw-10,y+26);ctx.stroke();

  // Key rows — more spacing, key column wider
  const rows=[
    ['↑','Άλμα'],
    ['↓  κράτα','Φόρτιση'],
    ['↓  άφεσε','Super Jump Attack!'],
    ['← →','Κίνηση'],
  ];
  const keyX=x+16, valX=x+145, rowStart=y+44, rowH=22;
  rows.forEach(([k,v],i)=>{
    const ry=rowStart+i*rowH;

    ctx.textAlign='left';ctx.fillText(k,keyX,ry);
    ctx.fillStyle='rgba(230,230,230,0.8)';
    ctx.font=`13px 'JetBrains Mono',monospace`;
    ctx.fillText(v,valX,ry);
  });

  // Mobile hint — separate line with divider
  ctx.strokeStyle='rgba(155,48,255,0.2)';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(x+10,y+bh-28);ctx.lineTo(x+bw-10,y+bh-28);ctx.stroke();
  ctx.fillStyle='rgba(100,180,255,0.55)';
  ctx.font=`12px 'JetBrains Mono',monospace`;ctx.textAlign='center';
  ctx.fillText('📱  Αριστ. αντίχειρας: ↑↓   ·   Δεξί: ← →',x+bw/2,y+bh-12);
}

//  MAIN LOOP
// ════════════════════════════════════════════════
let lastT=0;
function loop(ts){
  const dt=Math.min(ts-lastT,50);lastT=ts;
  blinkT+=dt;if(blinkT>520){blinkT=0;blink=!blink;}
  if(copiedFeedback>0)copiedFeedback-=dt;
  ctx.clearRect(0,0,W,H);
  switch(scr){
    case'INTRO':     drawIntro();break;
    case'MODE':      drawMode();break;
    case'CHARSEL':   drawCharSel();break;
    case'MPLOBY':    drawMPLobby();break;
    case'FIGHT':
      updateFight(dt);
      ctx.save();
      ctx.translate(shakeX,shakeY);
      drawBG();
      p1.draw(ctx);p2.draw(ctx);
      drawParticles();
      ctx.restore();
      drawHUD();drawCtrlRef();
      // Countdown overlay
      if(cdActive&&cdCount>0){
        ctx.save();
        ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fillRect(0,0,W,H);
        ctx.textAlign='center';
        ctx.font=`bold 28px 'Press Start 2P',monospace`;
        ctx.fillStyle='#FFD700';
        ctx.shadowBlur=50;ctx.shadowColor='#FFD700';
        ctx.fillText(cdCount,W/2,H/2+48);
        ctx.shadowBlur=0;
        ctx.font=`bold 12px 'Press Start 2P',monospace`;
        ctx.fillStyle='rgba(255,255,255,0.6)';
        ctx.fillText('ΕΤΟΙΜΟΣ;',W/2,H/2-60);
        ctx.restore();
      }
      break;
    case'STGCLEAR':  drawStageClear();break;
    case'GAMEOVER':  drawGameOver();break;
    case'MATCHOVER': drawMatchOver();break;
  }
  requestAnimationFrame(loop);
}

function checkUrl(){
  const r=new URLSearchParams(window.location.search).get('room');
  if(r){
    mode='multi';isHost=false;scr='MPLOBY';
    mpState='peer_init'; mpErr='';
    peer=new Peer(undefined, PEER_CFG);
    peer.on('open',id=>{
      myPeerId=id;
      mpState='connecting';
      connectToPeer(r);
    });
    peer.on('error',e=>{
      console.error('[PeerJS] Guest error:', e.type);
      mpState='error';
      const types={
        'peer-unavailable':'Ο host δεν βρέθηκε. Ο host πρέπει να έχει το παιχνίδι ανοιχτό.',
        'network':'Πρόβλημα δικτύου.',
        'server-error':'Server error. Δοκίμασε ξανά.',
      };
      mpErr=types[e.type]||`Σφάλμα: ${e.type}`;
    });
    peer.on('disconnected',()=>{
      console.warn('[PeerJS] Guest disconnected from signaling server');
    });
  }
}

// Wait for Press Start 2P font before starting
SFX.init();
checkUrl();
document.fonts.ready.then(()=>requestAnimationFrame(loop));
</script>
